
<style>
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
@keyframes flow { to { stroke-dashoffset: -24; } }
.pipe { stroke-dasharray: 8 6; animation: flow 1.2s linear infinite; }
.glow { animation: pulse 2s ease-in-out infinite; }
</style>

<div style="padding: 28px 20px 24px; font-family: var(--font-sans);">

  <div style="display:flex; align-items:center; justify-content:center; gap:0; position:relative;">

    <!-- USER INPUT -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px; min-width:90px;">
      <div style="width:56px;height:56px;border-radius:16px;background:#E6F1FB;border:1.5px solid #85B7EB;display:flex;align-items:center;justify-content:center;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;text-align:center;">User<br>input</span>
    </div>

    <!-- CONNECTOR 1 -->
    <svg width="48" height="24" style="flex-shrink:0;margin-top:-18px;">
      <line class="pipe" x1="4" y1="12" x2="44" y2="12" stroke="#B5D4F4" stroke-width="2" marker-end="url(#a1)"/>
      <defs><marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
    </svg>

    <!-- STAGE 1: DB SCAN -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;min-width:110px;">
      <div style="position:relative;">
        <div style="width:72px;height:72px;border-radius:20px;background:#E1F5EE;border:1.5px solid #5DCAA5;display:flex;align-items:center;justify-content:center;" class="glow">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v5c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 10v5c0 1.66 4.03 3 9 3s9-1.34 9-3v-5"/></svg>
        </div>
        <div style="position:absolute;top:-8px;right:-8px;background:#1D9E75;color:#fff;font-size:9px;font-weight:600;padding:2px 5px;border-radius:6px;">O(n)</div>
      </div>
      <span style="font-size:11px;color:var(--text-secondary);font-weight:500;text-align:center;">DB keyword<br>scan</span>
    </div>

    <!-- CONNECTOR 2 — goes to diamond -->
    <svg width="48" height="24" style="flex-shrink:0;margin-top:-18px;">
      <line class="pipe" x1="4" y1="12" x2="44" y2="12" stroke="#9FE1CB" stroke-width="2" marker-end="url(#a2)"/>
      <defs><marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
    </svg>

    <!-- DECISION -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;min-width:68px;">
      <div style="width:52px;height:52px;border:1.5px solid var(--border-strong);transform:rotate(45deg);border-radius:6px;background:var(--surface-1);display:flex;align-items:center;justify-content:center;margin-top:10px;">
        <span style="transform:rotate(-45deg);font-size:10px;color:var(--text-secondary);font-weight:600;text-align:center;line-height:1.1;">match<br>?</span>
      </div>
      <span style="font-size:10px;color:var(--text-muted);margin-top:6px;text-align:center;">route</span>
    </div>

  </div>

  <!-- BRANCH ROW -->
  <div style="display:flex;justify-content:center;gap:0;margin-top:4px;position:relative;align-items:flex-start;">

    <!-- YES branch — left side -->
    <div style="display:flex;flex-direction:column;align-items:center;width:220px;">
      <svg width="80" height="40">
        <path d="M40 0 L10 38" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ay)"/>
        <text x="14" y="22" font-size="10" fill="#0F6E56" font-weight="600" font-family="var(--font-sans)">yes</text>
        <defs><marker id="ay" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
      </svg>
      <div style="background:#E1F5EE;border:1.5px solid #5DCAA5;border-radius:12px;padding:10px 14px;text-align:center;min-width:160px;">
        <div style="font-size:11px;font-weight:600;color:#0F6E56;margin-bottom:4px;">Table returned</div>
        <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;">
          <span style="background:#085041;color:#9FE1CB;font-size:9px;padding:2px 7px;border-radius:10px;">evenements</span>
          <span style="background:#085041;color:#9FE1CB;font-size:9px;padding:2px 7px;border-radius:10px;">services</span>
          <span style="background:#085041;color:#9FE1CB;font-size:9px;padding:2px 7px;border-radius:10px;">transports</span>
        </div>
      </div>
    </div>

    <!-- NO branch — right side -->
    <div style="display:flex;flex-direction:column;align-items:center;width:340px;">
      <svg width="80" height="40">
        <path d="M40 0 L70 38" fill="none" stroke="#AFA9EC" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#an)"/>
        <text x="52" y="22" font-size="10" fill="#534AB7" font-weight="600" font-family="var(--font-sans)">no</text>
        <defs><marker id="an" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#AFA9EC" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
      </svg>

      <!-- MLP pipeline row -->
      <div style="display:flex;align-items:center;gap:6px;">

        <!-- BoW -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
          <div style="width:44px;height:44px;border-radius:12px;background:#EEEDFE;border:1.5px solid #AFA9EC;display:flex;align-items:center;justify-content:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
          </div>
          <span style="font-size:9px;color:var(--text-secondary);font-weight:500;">BoW</span>
        </div>

        <svg width="18" height="14" style="margin-bottom:16px;"><line x1="2" y1="7" x2="16" y2="7" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#amlp)"/><defs><marker id="amlp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#AFA9EC" stroke-width="1.5" stroke-linecap="round"/></marker></defs></svg>

        <!-- PyTorch MLP box -->
        <div style="background:#EEEDFE;border:1.5px solid #7F77DD;border-radius:14px;padding:10px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            <span style="font-size:11px;font-weight:600;color:#3C3489;">PyTorch MLP</span>
          </div>
          <!-- Layer strip -->
          <div style="display:flex;gap:3px;align-items:center;">
            <div style="background:#534AB7;color:#EEEDFE;font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;">fc1</div>
            <span style="font-size:9px;color:#7F77DD;">→</span>
            <div style="background:#534AB7;color:#EEEDFE;font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;">fc2</div>
            <span style="font-size:9px;color:#7F77DD;">→</span>
            <div style="background:#534AB7;color:#EEEDFE;font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;">fc3</div>
            <span style="font-size:9px;color:#7F77DD;">→</span>
            <div style="background:#3C3489;color:#CECBF6;font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;">argmax</div>
          </div>
        </div>

        <svg width="18" height="14" style="margin-bottom:16px;"><line x1="2" y1="7" x2="16" y2="7" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#ao)"/><defs><marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#AFA9EC" stroke-width="1.5" stroke-linecap="round"/></marker></defs></svg>

        <!-- Intent tag output -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
          <div style="width:44px;height:44px;border-radius:12px;background:#EEEDFE;border:1.5px solid #AFA9EC;display:flex;align-items:center;justify-content:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          </div>
          <span style="font-size:9px;color:var(--text-secondary);font-weight:500;">intent tag</span>
        </div>

      </div>
    </div>

  </div>

</div>
